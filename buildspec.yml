version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18 # or python: 3.10, java: corretto11, etc.
    commands:
      - echo Installing dependencies...
      - npm install # adjust based on your project
  build:
    commands:
      - echo Build started...
      - npm run build # or any build command like make, mvn package, etc.
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Preparing for deployment...
      - zip -r build-output.zip * # zip everything for CodeDeploy

artifacts:
  files:
    - build-output.zip
    - appspec.yml
    - scripts/** # optional - hooks for appspec.yml
  discard-paths: yes